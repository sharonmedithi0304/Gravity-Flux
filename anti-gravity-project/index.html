<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anti Gravity Playground</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Gravity Flux</h1>
    <p>Interactive gravity simulation built with JavaScript</p>

    <!-- Physics container -->
    <div id="container"></div>

    <!-- Controls UI -->
    <div id="controls">
        <button onclick="toggleGravity()" id="gravityBtn">Gravity: ON</button>
        <button onclick="clearBoxes()">Clear</button>
    </div>

    <!-- Script at bottom -->
    <script src="script.js"></script>

</body>
</html>
