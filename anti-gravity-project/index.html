<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Flux</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Hero Section -->
    <div id="hero">
        <h1>Gravity Flux</h1>
        <p>Interactive physics playground with real-time gravity simulation</p>
    </div>

    <!-- Physics container -->
    <div id="container"></div>

    <!-- Controls UI -->
    <div id="controls">
        <button onclick="toggleGravity()" id="gravityBtn">Gravity: ON</button>
        <button onclick="clearBoxes()">Clear</button>
    </div>

    <!-- Footer Info -->
    <div id="info">
        Click anywhere to spawn boxes • Drag to throw • Toggle gravity
    </div>

    <script src="script.js"></script>

</body>
</html>
